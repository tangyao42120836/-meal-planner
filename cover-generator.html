<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面排版生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9fafb;
    --surface: #ffffff;
    --surface2: #f4f4f5;
    --ink: #18181b;
    --ink2: #71717a;
    --accent: #f97316;
    --accent2: #ea580c;
    --border: #e4e4e7;
    --red: #ff4d4f;
    --red-bg: #fff1f0;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.05);
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
    padding-bottom: 60px;
  }

  header {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 20px; font-weight: 700; }
  .logo span { color: var(--accent); }

  .container {
    max-width: 1000px;
    margin: 24px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 32px;
    align-items: start;
  }

  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
  }

  /* === SIDEBAR FORM === */
  .form-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 88px;
  }
  .form-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 12px; }
  .form-group { margin-bottom: 20px; width: 100%; box-sizing: border-box; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 8px;
  }
  .form-group input[type="text"], .form-group select {
    width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 14px; outline: none; background: var(--surface2); box-sizing: border-box;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: var(--surface); }
  
  .form-desc { font-size: 12px; color: var(--ink2); margin-top: 6px; }

  .btn-gen {
    width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-gen:hover { background: var(--accent2); }
  
  .btn-sec {
    background: var(--surface); color: var(--ink); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .btn-sec:hover { background: var(--surface2); }

  /* === PREVIEW AREA === */
  .preview-panel {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  
  .preview-header {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    background: var(--surface); padding: 16px 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow);
  }

  /* === COVER CANVAS === */
  .cover-wrap {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  
  .cover-preview {
    width: 315px;
    height: 420px; /* 3:4 ratio */
    background: #fffdf9; /* 极简留白底色 */
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }
  
  /* 封面内部排版设计 */
  .cover-inner {
    padding: 36px 32px;
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
    box-sizing: border-box;
  }

  .c-series {
    font-size: 16px; font-weight: 800; color: var(--red); letter-spacing: 0.8px;
    margin-bottom: 50px;
    min-height: 24px;
  }
  
  .c-main-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 900;
    line-height: 1.25;
    color: var(--ink);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  
  .c-param-bar {
    display: inline-block;
    background: var(--red-bg);
    color: var(--ink);
    padding: 8px 16px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 500;
    margin-top: 18px;
  }
  
  .c-tags {
    margin-top: auto;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink2);
    letter-spacing: 0.5px;
    line-height: 1.6;
    word-break: break-word;
  }
  
  .c-footer {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: #a1a1aa;
    letter-spacing: 1px;
    font-weight: 600;
  }

</style>
</head>
<body>

<header>
  <div class="logo">备餐<span>助手</span> · 封面运营生成器</div>
  <a href="meal-planner.html" style="text-decoration:none;"><button class="btn-sec">返回工具主页</button></a>
</header>

<div class="container">
  <!-- 左侧表单 -->
  <div class="form-panel">
    <div class="form-title">📝 封面内容配置</div>
    
    <div class="form-group">
      <label>栏目小标题（选填）</label>
      <input type="text" id="i-series" value="打工人带饭指南 🍱" oninput="updatePreview()">
      <div class="form-desc">显示在左上角，支持 Emoji</div>
    </div>
    
    <div class="form-group">
      <label>主标题（必填）</label>
      <input type="text" id="i-title" value="本周省事晚餐" placeholder="如：本周省事晚餐" oninput="updatePreview()">
      <div class="form-desc">最多 12 字，超长自动换行/缩放</div>
    </div>
    
    <div class="form-group">
      <label>参数条胶囊（选填）</label>
      <input type="text" id="i-params" value="2天｜1人" placeholder="如：5天｜1人｜≤15分钟优先" oninput="updatePreview()">
      <div class="form-desc">显示在主标题下方</div>
    </div>
    
    <div class="form-group">
      <label>话题/标签（选填）</label>
      <input type="text" id="i-tags" value="#懒人神器 #一锅搞定 #空气炸锅万能" placeholder="带上 # 号体验更好" oninput="updatePreview()">
      <div class="form-desc">显示在靠近底部，最多两行</div>
    </div>
    
    <div class="form-group">
      <label>署名/水印（选填）</label>
      <input type="text" id="i-footer" value="@备餐助手" oninput="updatePreview()">
    </div>

    <button class="btn-gen" onclick="exportCover()">⬇️ 一键导出小红书封面 (PNG)</button>
  </div>

  <!-- 右侧预览 -->
  <div class="preview-panel">
    <div class="preview-header">
      <div style="font-weight:700; color:var(--ink);">👁️ 实时预览 (比例 3:4)</div>
      <div style="font-size:12px; color:var(--ink2);">导出分辨率: 1080 × 1440</div>
    </div>

    <div class="cover-wrap">
      <div class="cover-preview" id="cover-canvas">
        <div class="cover-inner">
          <div class="c-series" id="p-series">打工人带饭指南 🍱</div>
          <div class="c-main-title" id="p-title">本周省事晚餐</div>
          <div id="p-params-container">
            <span class="c-param-bar" id="p-params">2天｜1人</span>
          </div>
          <div class="c-tags" id="p-tags">#懒人神器 #一锅搞定 #空气炸锅万能</div>
          <div class="c-footer" id="p-footer">@备餐助手</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
  function updatePreview() {
    const series = document.getElementById('i-series').value.trim();
    const title = document.getElementById('i-title').value.trim() || '请输入标题';
    const params = document.getElementById('i-params').value.trim();
    const tags = document.getElementById('i-tags').value.trim();
    const footer = document.getElementById('i-footer').value.trim();

    // 更新栏目名
    document.getElementById('p-series').innerText = series;
    
    // 更新参数条
    const paramsContainer = document.getElementById('p-params-container');
    if (params) {
      paramsContainer.style.display = 'block';
      document.getElementById('p-params').innerText = params;
    } else {
      paramsContainer.style.display = 'none';
    }

    // 更新标签和署名
    document.getElementById('p-tags').innerText = tags;
    document.getElementById('p-footer').innerText = footer;

    // 处理大标题排版算法（自动换行、缩放）
    const titleEl = document.getElementById('p-title');
    let formattedTitle = title;
    
    // 限制最大字数
    if (formattedTitle.length > 12) {
      formattedTitle = formattedTitle.slice(0, 12);
    }
    
    // 自动换行：中文超过 6 个字符就强制在中间断开
    if (formattedTitle.length > 6) {
      const firstLine = formattedTitle.slice(0, 6);
      const secondLine = formattedTitle.slice(6);
      formattedTitle = firstLine + '<br>' + secondLine;
    }
    
    titleEl.innerHTML = formattedTitle;
    
    // 根据字数动态调整字号（基础字号42px）
    if (title.length > 10) {
      titleEl.style.fontSize = '36px';
    } else {
      titleEl.style.fontSize = '42px';
    }
  }

  function exportCover() {
    const el = document.getElementById('cover-canvas');
    if (typeof html2canvas !== 'function') {
      alert('导出组件未加载完毕，请稍后再试');
      return;
    }
    
    const titleStr = document.getElementById('i-title').value.trim() || '封面';
    
    // 按钮状态
    const btn = document.querySelector('.btn-gen');
    const oldText = btn.innerHTML;
    btn.innerHTML = '⏳ 正在导出...';
    btn.disabled = true;

    // 小红书封面标准尺寸 1080x1440
    // 当前预览窗是 315x420，放大 3.42857 倍即为 1080x1440
    html2canvas(el, { 
      scale: 3.42857, 
      useCORS: true, 
      backgroundColor: '#fffdf9' 
    }).then(canvas => {
      const a = document.createElement('a');
      const timeStr = new Date().toISOString().replace(/[-:T]/g, '').slice(0, 12);
      a.download = `cover_${timeStr}_${titleStr}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
      
      btn.innerHTML = '✅ 导出成功！';
      setTimeout(() => {
        btn.innerHTML = oldText;
        btn.disabled = false;
      }, 2000);
    }).catch(err => {
      alert('导出失败：' + err.message);
      btn.innerHTML = oldText;
      btn.disabled = false;
    });
  }

  // 初始化预览
  updatePreview();
</script>
</body>
</html>
